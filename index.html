<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage / Retro Photo Filter App</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f5efe6;
            --brown: #3d2b1f;
            --amber: #c8914a;
            --rust: #a0522d;
            --sepia-dark: #704214;
            --light-tan: #e8d5b7;
            --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.4'/%3E%3C/svg%3E");
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--cream);
            color: var(--brown);
            font-family: 'DM Mono', monospace;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: var(--grain);
            opacity: 0.08;
            pointer-events: none;
            z-index: 1000;
        }

        /* Back button */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: var(--brown);
            text-decoration: none;
            font-size: 0.85rem;
            font-family: 'DM Mono', monospace;
            background: rgba(245,239,230,0.85);
            padding: 10px 18px;
            border-radius: 2px;
            border: 1px solid var(--amber);
            backdrop-filter: blur(4px);
            transition: 0.2s;
            letter-spacing: 0.05em;
        }
        .back-btn:hover { background: var(--amber); color: var(--cream); }

        /* Header */
        header {
            text-align: center;
            padding: 60px 20px 30px;
            border-bottom: 1px solid var(--light-tan);
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 5vw, 3.8rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--brown);
            line-height: 1.1;
        }

        header h1 span {
            font-style: italic;
            color: var(--amber);
        }

        header p {
            margin-top: 12px;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--rust);
            opacity: 0.7;
        }

        /* Decorative line */
        .deco {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 16px auto;
        }
        .deco::before, .deco::after {
            content: '';
            display: block;
            width: 60px;
            height: 1px;
            background: var(--amber);
        }
        .deco-diamond {
            width: 6px; height: 6px;
            background: var(--amber);
            transform: rotate(45deg);
        }

        /* Main layout */
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px 60px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        @media (max-width: 768px) {
            main { grid-template-columns: 1fr; }
        }

        /* Left panel */
        .left-panel { display: flex; flex-direction: column; gap: 24px; }

        /* Upload zone */
        .upload-zone {
            border: 2px dashed var(--amber);
            border-radius: 4px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(200,145,74,0.04);
            position: relative;
            overflow: hidden;
        }
        .upload-zone:hover, .upload-zone.dragover {
            background: rgba(200,145,74,0.1);
            border-color: var(--rust);
        }
        .upload-zone input { display: none; }

        .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            display: block;
            opacity: 0.6;
        }

        .upload-zone h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            margin-bottom: 6px;
            color: var(--brown);
        }

        .upload-zone p {
            font-size: 0.75rem;
            color: var(--rust);
            opacity: 0.7;
            letter-spacing: 0.08em;
        }

        /* Filter panel */
        .filter-panel {
            background: white;
            border: 1px solid var(--light-tan);
            border-radius: 4px;
            padding: 24px;
        }

        .panel-title {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-style: italic;
            color: var(--brown);
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--light-tan);
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .filter-btn {
            padding: 10px 6px;
            border: 1px solid var(--light-tan);
            border-radius: 3px;
            background: var(--cream);
            color: var(--brown);
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .filter-btn:hover { border-color: var(--amber); color: var(--rust); }
        .filter-btn.active {
            background: var(--brown);
            color: var(--cream);
            border-color: var(--brown);
        }

        /* Intensity slider */
        .slider-group { margin-bottom: 16px; }
        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--rust);
            margin-bottom: 8px;
        }
        input[type=range] {
            width: 100%;
            appearance: none;
            height: 2px;
            background: var(--light-tan);
            border-radius: 2px;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: var(--amber);
            cursor: pointer;
            border: 2px solid var(--brown);
        }

        /* Action buttons */
        .action-row {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .btn-primary {
            flex: 1;
            padding: 12px;
            background: var(--brown);
            color: var(--cream);
            border: none;
            border-radius: 3px;
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary:hover { background: var(--rust); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-secondary {
            padding: 12px 16px;
            background: transparent;
            color: var(--brown);
            border: 1px solid var(--amber);
            border-radius: 3px;
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-secondary:hover { background: var(--amber); color: var(--cream); }
        .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Right panel — canvas */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .canvas-wrapper {
            position: relative;
            background: var(--brown);
            border-radius: 4px;
            overflow: hidden;
            min-height: 360px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .canvas-placeholder {
            text-align: center;
            color: rgba(245,239,230,0.4);
            padding: 40px;
        }

        .canvas-placeholder .big-icon { font-size: 3rem; margin-bottom: 12px; display: block; }
        .canvas-placeholder p {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1rem;
        }

        canvas {
            max-width: 100%;
            max-height: 500px;
            display: block;
            border-radius: 2px;
        }

        /* Film frame decoration */
        .film-strip {
            display: flex;
            gap: 4px;
            overflow: hidden;
            height: 20px;
        }
        .film-hole {
            width: 16px; height: 12px;
            background: var(--brown);
            border-radius: 2px;
            flex-shrink: 0;
        }

        /* Info tag */
        .info-tag {
            font-size: 0.7rem;
            color: var(--rust);
            opacity: 0.6;
            letter-spacing: 0.08em;
            text-align: center;
            text-transform: uppercase;
        }

        /* Fade-in animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body>

<a href="/" class="back-btn">← Späť na portál</a>

<header>
    <h1>Vintage &amp; <span>Retro</span><br>Photo Filters</h1>
    <div class="deco"><div class="deco-diamond"></div></div>
    <p>Olexandra Tereshchenko · B-MSAP · FEI STU</p>
</header>

<main>
    <!-- Left panel -->
    <div class="left-panel">

        <!-- Upload -->
        <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" accept="image/*">
            <span class="upload-icon">📷</span>
            <h3>Upload your photo</h3>
            <p>Drag &amp; drop or click to browse</p>
        </div>

        <!-- Filters -->
        <div class="filter-panel">
            <div class="panel-title">— Choose a filter —</div>

            <div class="filter-grid">
                <button class="filter-btn active" data-filter="none">Original</button>
                <button class="filter-btn" data-filter="sepia">Sepia</button>
                <button class="filter-btn" data-filter="vintage">Vintage</button>
                <button class="filter-btn" data-filter="polaroid">Polaroid</button>
                <button class="filter-btn" data-filter="noir">Noir</button>
                <button class="filter-btn" data-filter="faded">Faded</button>
                <button class="filter-btn" data-filter="warm">Warm</button>
                <button class="filter-btn" data-filter="kodak">Kodak</button>
                <button class="filter-btn" data-filter="lomo">Lomo</button>
            </div>

            <div class="slider-group">
                <div class="slider-label">
                    <span>Intensity</span>
                    <span id="intensityVal">80%</span>
                </div>
                <input type="range" id="intensitySlider" min="0" max="100" value="80">
            </div>

            <div class="slider-group">
                <div class="slider-label">
                    <span>Grain</span>
                    <span id="grainVal">30%</span>
                </div>
                <input type="range" id="grainSlider" min="0" max="100" value="30">
            </div>

            <div class="slider-group">
                <div class="slider-label">
                    <span>Vignette</span>
                    <span id="vignetteVal">50%</span>
                </div>
                <input type="range" id="vignetteSlider" min="0" max="100" value="50">
            </div>

            <div class="action-row">
                <button class="btn-primary" id="applyBtn" disabled>Apply Filter</button>
                <button class="btn-secondary" id="downloadBtn" disabled>Save ↓</button>
            </div>
        </div>

    </div>

    <!-- Right panel -->
    <div class="right-panel">
        <div class="film-strip" id="filmTop">
            <!-- generated by JS -->
        </div>

        <div class="canvas-wrapper" id="canvasWrapper">
            <div class="canvas-placeholder" id="placeholder">
                <span class="big-icon">🎞️</span>
                <p>Your photo will appear here</p>
            </div>
            <canvas id="photoCanvas" style="display:none;"></canvas>
        </div>

        <div class="film-strip" id="filmBottom"></div>

        <div class="info-tag" id="infoTag">No image loaded</div>
    </div>
</main>

<script>
    // Film strip decoration
    function makeFilmStrip(el) {
        for (let i = 0; i < 40; i++) {
            const d = document.createElement('div');
            d.className = 'film-hole';
            el.appendChild(d);
        }
    }
    makeFilmStrip(document.getElementById('filmTop'));
    makeFilmStrip(document.getElementById('filmBottom'));

    // State
    let originalImageData = null;
    let currentFilter = 'none';
    const canvas = document.getElementById('photoCanvas');
    const ctx = canvas.getContext('2d');

    // Upload
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    fileInput.addEventListener('change', e => loadImage(e.target.files[0]));

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        loadImage(e.dataTransfer.files[0]);
    });

    function loadImage(file) {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => {
                // Fit canvas
                const maxW = 600, maxH = 500;
                let w = img.width, h = img.height;
                if (w > maxW) { h = h * maxW / w; w = maxW; }
                if (h > maxH) { w = w * maxH / h; h = maxH; }
                canvas.width = Math.round(w);
                canvas.height = Math.round(h);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                canvas.style.display = 'block';
                document.getElementById('placeholder').style.display = 'none';
                document.getElementById('applyBtn').disabled = false;
                document.getElementById('downloadBtn').disabled = false;
                document.getElementById('infoTag').textContent = `${img.width} × ${img.height}px · ${file.name}`;
                canvas.classList.add('fade-in');
                applyCurrentFilter();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            if (originalImageData) applyCurrentFilter();
        });
    });

    // Sliders
    ['intensitySlider','grainSlider','vignetteSlider'].forEach(id => {
        const el = document.getElementById(id);
        const label = document.getElementById(id.replace('Slider','Val'));
        el.addEventListener('input', () => {
            label.textContent = el.value + '%';
            if (originalImageData) applyCurrentFilter();
        });
    });

    // Apply button
    document.getElementById('applyBtn').addEventListener('click', () => {
        if (originalImageData) applyCurrentFilter();
    });

    // Download
    document.getElementById('downloadBtn').addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = `vintage_filter_${currentFilter}.jpg`;
        link.href = canvas.toDataURL('image/jpeg', 0.92);
        link.click();
    });

    function applyCurrentFilter() {
        if (!originalImageData) return;
        const intensity = document.getElementById('intensitySlider').value / 100;
        const grainAmt = document.getElementById('grainSlider').value / 100;
        const vignetteAmt = document.getElementById('vignetteSlider').value / 100;

        // Reset to original
        const newData = new ImageData(
            new Uint8ClampedArray(originalImageData.data),
            originalImageData.width,
            originalImageData.height
        );
        const d = newData.data;
        const w = newData.width, h = newData.height;

        for (let i = 0; i < d.length; i += 4) {
            let r = d[i], g = d[i+1], b = d[i+2];

            // Apply filter
            const filtered = applyFilter(r, g, b, currentFilter);
            r = filtered[0]; g = filtered[1]; b = filtered[2];

            // Blend with original by intensity
            d[i]   = lerp(d[i],   r, intensity);
            d[i+1] = lerp(d[i+1], g, intensity);
            d[i+2] = lerp(d[i+2], b, intensity);
        }

        // Grain
        if (grainAmt > 0) {
            for (let i = 0; i < d.length; i += 4) {
                const noise = (Math.random() - 0.5) * grainAmt * 80;
                d[i]   = clamp(d[i]   + noise);
                d[i+1] = clamp(d[i+1] + noise);
                d[i+2] = clamp(d[i+2] + noise);
            }
        }

        ctx.putImageData(newData, 0, 0);

        // Vignette (drawn on top)
        if (vignetteAmt > 0) {
            const cx = w / 2, cy = h / 2;
            const radius = Math.sqrt(cx*cx + cy*cy);
            const grad = ctx.createRadialGradient(cx, cy, radius * (1 - vignetteAmt * 0.8), cx, cy, radius);
            grad.addColorStop(0, 'rgba(0,0,0,0)');
            grad.addColorStop(1, `rgba(0,0,0,${vignetteAmt * 0.75})`);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
        }
    }

    function applyFilter(r, g, b, filter) {
        switch(filter) {
            case 'sepia': {
                const tr = r*0.393 + g*0.769 + b*0.189;
                const tg = r*0.349 + g*0.686 + b*0.168;
                const tb = r*0.272 + g*0.534 + b*0.131;
                return [clamp(tr), clamp(tg), clamp(tb)];
            }
            case 'vintage': {
                r = clamp(r * 1.1 + 15);
                g = clamp(g * 0.95);
                b = clamp(b * 0.75 + 10);
                const gray = 0.299*r + 0.587*g + 0.114*b;
                r = clamp(gray * 0.5 + r * 0.5 + 20);
                g = clamp(gray * 0.4 + g * 0.6);
                b = clamp(gray * 0.3 + b * 0.7 - 10);
                return [r, g, b];
            }
            case 'polaroid': {
                r = clamp(r * 1.05 + 20);
                g = clamp(g * 1.0 + 10);
                b = clamp(b * 0.9 + 25);
                return [r, g, b];
            }
            case 'noir': {
                const gray = clamp(0.299*r + 0.587*g + 0.114*b);
                const contrast = clamp((gray - 128) * 1.4 + 128);
                return [contrast, contrast, contrast];
            }
            case 'faded': {
                r = clamp(r * 0.85 + 30);
                g = clamp(g * 0.85 + 25);
                b = clamp(b * 0.9 + 20);
                return [r, g, b];
            }
            case 'warm': {
                r = clamp(r * 1.15 + 10);
                g = clamp(g * 1.05);
                b = clamp(b * 0.8);
                return [r, g, b];
            }
            case 'kodak': {
                r = clamp(r * 1.1 + 8);
                g = clamp(g * 1.0 + 5);
                b = clamp(b * 0.85 + 15);
                const gray2 = 0.299*r + 0.587*g + 0.114*b;
                r = clamp(r * 0.7 + gray2 * 0.3 + 10);
                g = clamp(g * 0.8 + gray2 * 0.2);
                b = clamp(b * 0.75 + gray2 * 0.25);
                return [r, g, b];
            }
            case 'lomo': {
                r = clamp(r > 128 ? r * 1.1 : r * 0.9);
                g = clamp(g * 0.9);
                b = clamp(b * 1.1);
                return [r, g, b];
            }
            default:
                return [r, g, b];
        }
    }

    function lerp(a, b, t) { return clamp(a + (b - a) * t); }
    function clamp(v) { return Math.max(0, Math.min(255, Math.round(v))); }
</script>

</body>
</html>
