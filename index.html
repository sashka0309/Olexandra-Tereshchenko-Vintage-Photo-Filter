<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage / Retro Photo Filter App</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --cream:#f5efe6;--brown:#3d2b1f;--amber:#c8914a;--rust:#a0522d;--tan:#e8d5b7; }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--cream);color:var(--brown);font-family:'DM Mono',monospace;min-height:100vh;}
        .back-btn{position:fixed;top:20px;left:20px;z-index:100;color:var(--brown);text-decoration:none;font-size:0.85rem;background:rgba(245,239,230,0.9);padding:10px 18px;border-radius:2px;border:1px solid var(--amber);transition:0.2s;}
        .back-btn:hover{background:var(--amber);color:var(--cream);}
        header{text-align:center;padding:60px 20px 22px;border-bottom:1px solid var(--tan);}
        header h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,3.5vw,3rem);font-weight:700;color:var(--brown);line-height:1.1;}
        header h1 span{font-style:italic;color:var(--amber);}
        header p{margin-top:10px;font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--rust);opacity:0.7;}
        .deco{display:flex;align-items:center;justify-content:center;gap:12px;margin:10px auto;}
        .deco::before,.deco::after{content:'';display:block;width:50px;height:1px;background:var(--amber);}
        .deco-diamond{width:6px;height:6px;background:var(--amber);transform:rotate(45deg);}
        main{max-width:1400px;margin:0 auto;padding:24px 16px 60px;display:grid;grid-template-columns:230px 1fr 230px;gap:18px;align-items:start;}
        @media(max-width:900px){main{grid-template-columns:1fr;}}
        /* LEFT */
        .left-panel{display:flex;flex-direction:column;gap:12px;position:sticky;top:20px;}
        .upload-zone{border:2px dashed var(--amber);border-radius:4px;padding:18px 12px;text-align:center;cursor:pointer;transition:0.3s;background:rgba(200,145,74,0.04);}
        .upload-zone:hover,.upload-zone.dragover{background:rgba(200,145,74,0.12);border-color:var(--rust);}
        .upload-zone input{display:none;}
        .upload-icon{font-size:1.8rem;margin-bottom:6px;display:block;opacity:0.6;}
        .upload-zone h3{font-family:'Playfair Display',serif;font-size:1rem;margin-bottom:4px;}
        .upload-zone p{font-size:0.68rem;color:var(--rust);opacity:0.7;}
        .filter-panel{background:white;border:1px solid var(--tan);border-radius:4px;padding:12px;}
        .panel-title{font-family:'Playfair Display',serif;font-size:0.88rem;font-style:italic;color:var(--brown);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--tan);}
        .filter-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;max-height:490px;overflow-y:auto;padding-right:2px;}
        .filter-grid::-webkit-scrollbar{width:3px;}
        .filter-grid::-webkit-scrollbar-thumb{background:var(--amber);border-radius:2px;}
        .filter-btn{padding:8px 4px;border:1px solid var(--tan);border-radius:3px;background:var(--cream);color:var(--brown);font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.03em;cursor:pointer;transition:0.15s;text-transform:uppercase;}
        .filter-btn:hover{border-color:var(--amber);color:var(--rust);}
        .filter-btn.active{background:var(--brown);color:var(--cream);border-color:var(--brown);}
        /* CENTER */
        .center-panel{display:flex;flex-direction:column;gap:10px;}
        .film-strip{display:flex;gap:4px;overflow:hidden;height:16px;}
        .film-hole{width:13px;height:10px;background:var(--brown);border-radius:2px;flex-shrink:0;}
        .canvas-wrapper{background:var(--brown);border-radius:4px;overflow:hidden;min-height:400px;display:flex;align-items:center;justify-content:center;}
        .canvas-placeholder{text-align:center;color:rgba(245,239,230,0.4);padding:40px;}
        .canvas-placeholder .big-icon{font-size:2.5rem;margin-bottom:10px;display:block;}
        .canvas-placeholder p{font-family:'Playfair Display',serif;font-style:italic;}
        canvas{max-width:100%;max-height:560px;display:block;border-radius:2px;}
        .info-tag{font-size:0.65rem;color:var(--rust);opacity:0.6;letter-spacing:0.08em;text-align:center;text-transform:uppercase;}
        /* RIGHT */
        .right-panel{background:white;border:1px solid var(--tan);border-radius:4px;padding:18px;display:flex;flex-direction:column;gap:16px;position:sticky;top:20px;}
        .controls-title{font-family:'Playfair Display',serif;font-size:0.88rem;font-style:italic;color:var(--brown);padding-bottom:8px;border-bottom:1px solid var(--tan);}
        .slider-label{display:flex;justify-content:space-between;font-size:0.68rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--rust);margin-bottom:8px;}
        input[type=range]{width:100%;appearance:none;height:2px;background:var(--tan);border-radius:2px;outline:none;}
        input[type=range]::-webkit-slider-thumb{appearance:none;width:14px;height:14px;border-radius:50%;background:var(--amber);cursor:pointer;border:2px solid var(--brown);}
        .divider{height:1px;background:var(--tan);}
        .btn-primary{width:100%;padding:12px;background:var(--brown);color:var(--cream);border:none;border-radius:3px;font-family:'DM Mono',monospace;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:0.2s;}
        .btn-primary:hover{background:var(--rust);}
        .btn-primary:disabled{opacity:0.4;cursor:not-allowed;}
        .btn-secondary{width:100%;padding:12px;background:transparent;color:var(--brown);border:1px solid var(--amber);border-radius:3px;font-family:'DM Mono',monospace;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:0.2s;}
        .btn-secondary:hover{background:var(--amber);color:var(--cream);}
        .btn-secondary:disabled{opacity:0.4;cursor:not-allowed;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .fade-in{animation:fadeIn 0.4s ease forwards;}
    </style>
</head>
<body>
<a href="/" class="back-btn">← Späť na portál</a>
<header>
    <h1>Vintage &amp; <span>Retro</span> Photo Filters</h1>
    <div class="deco"><div class="deco-diamond"></div></div>
    <p>Olexandra Tereshchenko · B-MSAP · FEI STU</p>
</header>
<main>
    <div class="left-panel">
        <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" accept="image/*">
            <span class="upload-icon">📷</span>
            <h3>Upload photo</h3>
            <p>Drag &amp; drop or click</p>
        </div>
        <div class="filter-panel">
            <div class="panel-title">— Choose a filter —</div>
            <div class="filter-grid">
                <button class="filter-btn active" data-filter="none">Original</button>
                <button class="filter-btn" data-filter="sepia">Sepia</button>
                <button class="filter-btn" data-filter="vintage">Vintage</button>
                <button class="filter-btn" data-filter="polaroid">Polaroid</button>
                <button class="filter-btn" data-filter="noir">Noir</button>
                <button class="filter-btn" data-filter="faded">Faded</button>
                <button class="filter-btn" data-filter="warm">Warm</button>
                <button class="filter-btn" data-filter="kodak">Kodak</button>
                <button class="filter-btn" data-filter="lomo">Lomo</button>
                <button class="filter-btn" data-filter="cross">Cross Process</button>
                <button class="filter-btn" data-filter="pink">Faded Pink</button>
                <button class="filter-btn" data-filter="cyberpunk">Cyberpunk</button>
                <button class="filter-btn" data-filter="dreamy">Dreamy</button>
                <button class="filter-btn" data-filter="sunset">Sunset</button>
                <button class="filter-btn" data-filter="matte">Matte</button>
                <button class="filter-btn" data-filter="infrared">Infrared</button>
                <button class="filter-btn" data-filter="dusty">Dusty</button>
                <button class="filter-btn" data-filter="teal">Teal &amp; Orange</button>
                <button class="filter-btn" data-filter="moonlight">Moonlight</button>
                <button class="filter-btn" data-filter="summer">Summer</button>
                <button class="filter-btn" data-filter="chrome">Chrome</button>
                <button class="filter-btn" data-filter="forest">Forest</button>
                <button class="filter-btn" data-filter="arctic">Arctic</button>
                <button class="filter-btn" data-filter="golden">Golden Hour</button>
                <button class="filter-btn" data-filter="acid">Acid</button>
                <button class="filter-btn" data-filter="blueprint">Blueprint</button>
                <button class="filter-btn" data-filter="velvet">Velvet</button>
                <button class="filter-btn" data-filter="ember">Ember</button>
                <button class="filter-btn" data-filter="aqua">Aqua</button>
                <button class="filter-btn" data-filter="lavender">Lavender</button>
                <button class="filter-btn" data-filter="toxic">Toxic</button>
                <button class="filter-btn" data-filter="bronze">Bronze</button>
                <button class="filter-btn" data-filter="ice">Ice</button>
                <button class="filter-btn" data-filter="desert">Desert</button>
                <button class="filter-btn" data-filter="neon">Neon</button>
                <button class="filter-btn" data-filter="coffee">Coffee</button>
                <button class="filter-btn" data-filter="galaxy">Galaxy</button>
                <button class="filter-btn" data-filter="pop">Pop Art</button>
                <button class="filter-btn" data-filter="autumn">Autumn</button>
                <button class="filter-btn" data-filter="bleach">Bleach</button>
            </div>
        </div>
    </div>
    <div class="center-panel">
        <div class="film-strip" id="filmTop"></div>
        <div class="canvas-wrapper">
            <div class="canvas-placeholder" id="placeholder">
                <span class="big-icon">🎞️</span>
                <p>Your photo will appear here</p>
            </div>
            <canvas id="photoCanvas" style="display:none;"></canvas>
        </div>
        <div class="film-strip" id="filmBottom"></div>
        <div class="info-tag" id="infoTag">No image loaded</div>
    </div>
    <div class="right-panel">
        <div class="controls-title">— Adjustments —</div>
        <div>
            <div class="slider-label"><span>Intensity</span><span id="intensityVal">80%</span></div>
            <input type="range" id="intensitySlider" min="0" max="100" value="80">
        </div>
        <div>
            <div class="slider-label"><span>Grain</span><span id="grainVal">30%</span></div>
            <input type="range" id="grainSlider" min="0" max="100" value="30">
        </div>
        <div>
            <div class="slider-label"><span>Vignette</span><span id="vignetteVal">50%</span></div>
            <input type="range" id="vignetteSlider" min="0" max="100" value="50">
        </div>
        <div class="divider"></div>
        <button class="btn-primary" id="applyBtn" disabled>Apply Filter</button>
        <button class="btn-secondary" id="downloadBtn" disabled>Save ↓</button>
    </div>
</main>
<script>
    function makeFilmStrip(el){for(let i=0;i<50;i++){const d=document.createElement('div');d.className='film-hole';el.appendChild(d);}}
    makeFilmStrip(document.getElementById('filmTop'));
    makeFilmStrip(document.getElementById('filmBottom'));
    let originalImageData=null,currentFilter='none';
    const canvas=document.getElementById('photoCanvas'),ctx=canvas.getContext('2d');
    const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput');
    fileInput.addEventListener('change',e=>loadImage(e.target.files[0]));
    dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover');});
    dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');loadImage(e.dataTransfer.files[0]);});
    function loadImage(file){
        if(!file||!file.type.startsWith('image/'))return;
        const reader=new FileReader();
        reader.onload=e=>{
            const img=new Image();
            img.onload=()=>{
                const maxW=720,maxH=560;let w=img.width,h=img.height;
                if(w>maxW){h=h*maxW/w;w=maxW;}if(h>maxH){w=w*maxH/h;h=maxH;}
                canvas.width=Math.round(w);canvas.height=Math.round(h);
                ctx.drawImage(img,0,0,canvas.width,canvas.height);
                originalImageData=ctx.getImageData(0,0,canvas.width,canvas.height);
                canvas.style.display='block';
                document.getElementById('placeholder').style.display='none';
                document.getElementById('applyBtn').disabled=false;
                document.getElementById('downloadBtn').disabled=false;
                document.getElementById('infoTag').textContent=img.width+' × '+img.height+'px · '+file.name;
                canvas.classList.add('fade-in');applyCurrentFilter();
            };img.src=e.target.result;
        };reader.readAsDataURL(file);
    }
    document.querySelectorAll('.filter-btn').forEach(btn=>{
        btn.addEventListener('click',()=>{
            document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');currentFilter=btn.dataset.filter;
            if(originalImageData)applyCurrentFilter();
        });
    });
    ['intensitySlider','grainSlider','vignetteSlider'].forEach(id=>{
        const el=document.getElementById(id),label=document.getElementById(id.replace('Slider','Val'));
        el.addEventListener('input',()=>{label.textContent=el.value+'%';if(originalImageData)applyCurrentFilter();});
    });
    document.getElementById('applyBtn').addEventListener('click',()=>{if(originalImageData)applyCurrentFilter();});
    document.getElementById('downloadBtn').addEventListener('click',()=>{
        const link=document.createElement('a');link.download='vintage_filter_'+currentFilter+'.jpg';
        link.href=canvas.toDataURL('image/jpeg',0.92);link.click();
    });
    function applyCurrentFilter(){
        if(!originalImageData)return;
        const intensity=document.getElementById('intensitySlider').value/100;
        const grainAmt=document.getElementById('grainSlider').value/100;
        const vignetteAmt=document.getElementById('vignetteSlider').value/100;
        const newData=new ImageData(new Uint8ClampedArray(originalImageData.data),originalImageData.width,originalImageData.height);
        const d=newData.data,w=newData.width,h=newData.height;
        for(let i=0;i<d.length;i+=4){
            let r=d[i],g=d[i+1],b=d[i+2];
            const f=applyFilter(r,g,b,currentFilter);
            d[i]=lerp(d[i],f[0],intensity);d[i+1]=lerp(d[i+1],f[1],intensity);d[i+2]=lerp(d[i+2],f[2],intensity);
        }
        if(grainAmt>0){for(let i=0;i<d.length;i+=4){const n=(Math.random()-0.5)*grainAmt*80;d[i]=clamp(d[i]+n);d[i+1]=clamp(d[i+1]+n);d[i+2]=clamp(d[i+2]+n);}}
        ctx.putImageData(newData,0,0);
        if(vignetteAmt>0){
            const cx=w/2,cy=h/2,radius=Math.sqrt(cx*cx+cy*cy);
            const grad=ctx.createRadialGradient(cx,cy,radius*(1-vignetteAmt*0.8),cx,cy,radius);
            grad.addColorStop(0,'rgba(0,0,0,0)');grad.addColorStop(1,'rgba(0,0,0,'+(vignetteAmt*0.75)+')');
            ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);
        }
    }
    function applyFilter(r,g,b,f){
        switch(f){
            case 'sepia':{const tr=r*0.393+g*0.769+b*0.189,tg=r*0.349+g*0.686+b*0.168,tb=r*0.272+g*0.534+b*0.131;return[clamp(tr),clamp(tg),clamp(tb)];}
            case 'vintage':{r=clamp(r*1.1+15);g=clamp(g*0.95);b=clamp(b*0.75+10);const gr=0.299*r+0.587*g+0.114*b;return[clamp(gr*0.5+r*0.5+20),clamp(gr*0.4+g*0.6),clamp(gr*0.3+b*0.7-10)];}
            case 'polaroid':return[clamp(r*1.05+20),clamp(g+10),clamp(b*0.9+25)];
            case 'noir':{const gr=clamp(0.299*r+0.587*g+0.114*b),c=clamp((gr-128)*1.4+128);return[c,c,c];}
            case 'faded':return[clamp(r*0.85+30),clamp(g*0.85+25),clamp(b*0.9+20)];
            case 'warm':return[clamp(r*1.15+10),clamp(g*1.05),clamp(b*0.8)];
            case 'kodak':{r=clamp(r*1.1+8);g=clamp(g+5);b=clamp(b*0.85+15);const gr=0.299*r+0.587*g+0.114*b;return[clamp(r*0.7+gr*0.3+10),clamp(g*0.8+gr*0.2),clamp(b*0.75+gr*0.25)];}
            case 'lomo':return[clamp(r>128?r*1.1:r*0.9),clamp(g*0.9),clamp(b*1.1)];
            case 'cross':return[clamp(r*1.2-g*0.1+20),clamp(g*0.85+b*0.1),clamp(b*0.7+r*0.15-10)];
            case 'pink':{r=clamp(r*1.1+25);g=clamp(g*0.9+10);b=clamp(b*0.95+20);const gp=0.299*r+0.587*g+0.114*b;return[clamp(r*0.6+gp*0.4+15),clamp(g*0.7+gp*0.3),clamp(b*0.8+gp*0.2+10)];}
            case 'cyberpunk':{const gc=0.299*r+0.587*g+0.114*b;return[clamp(gc*0.3+r*0.3+20),clamp(gc*0.1+g*0.2),clamp(gc*0.5+b*0.8+30)];}
            case 'dreamy':return[clamp(r*0.9+30),clamp(g*0.9+25),clamp(b*1.05+30)];
            case 'sunset':return[clamp(r*1.2+20),clamp(g*0.85+10),clamp(b*0.6)];
            case 'matte':return[clamp(r*0.9+20),clamp(g*0.88+18),clamp(b*0.85+22)];
            case 'infrared':{const gi=0.299*r+0.587*g+0.114*b;return[clamp(gi*0.6+r*0.7+30),clamp(gi*0.3+g*0.2),clamp(gi*0.1+b*0.1)];}
            case 'dusty':{const gd=0.299*r+0.587*g+0.114*b;return[clamp(r*0.7+gd*0.3+25),clamp(g*0.75+gd*0.25+18),clamp(b*0.65+gd*0.35+15)];}
            case 'teal':{r=clamp(r*1.15+15);g=clamp(g*0.95+5);b=clamp(b*0.75+20);return r>g&&r>b?[clamp(r*1.1),clamp(g*0.9),clamp(b*0.8)]:[clamp(r*0.8),clamp(g*1.1+10),clamp(b*1.2+15)];}
            case 'moonlight':{const gm=0.299*r+0.587*g+0.114*b;return[clamp(gm*0.6+r*0.2+10),clamp(gm*0.65+g*0.2+15),clamp(gm*0.8+b*0.4+30)];}
            case 'summer':return[clamp(r*1.1+15),clamp(g*1.05+8),clamp(b*0.85)];
            case 'chrome':{const gc=0.299*r+0.587*g+0.114*b,c=clamp((gc-128)*1.5+128);return[clamp(c*0.85+r*0.3),clamp(c*0.9+g*0.2),clamp(c+b*0.2+10)];}
            case 'forest':return[clamp(r*0.85),clamp(g*1.15+10),clamp(b*0.8)];
            case 'arctic':{const ga=0.299*r+0.587*g+0.114*b;return[clamp(ga*0.5+r*0.4+20),clamp(ga*0.6+g*0.4+25),clamp(ga*0.7+b*0.5+40)];}
            case 'golden':return[clamp(r*1.25+20),clamp(g+8),clamp(b*0.55)];
            case 'acid':return[clamp(r>100?r*1.3:r*0.7),clamp(g*1.4-20),clamp(b*0.5+30)];
            case 'blueprint':{const gb=0.299*r+0.587*g+0.114*b;return[clamp(gb*0.2+10),clamp(gb*0.3+20),clamp(gb*0.9+40)];}
            case 'velvet':return[clamp(r*1.1+15),clamp(g*0.7),clamp(b*1.2+20)];
            case 'ember':return[clamp(r*1.3+25),clamp(g*0.75+5),clamp(b*0.4)];
            case 'aqua':return[clamp(r*0.75),clamp(g*1.1+15),clamp(b*1.3+20)];
            case 'lavender':return[clamp(r*0.95+20),clamp(g*0.85+10),clamp(b*1.15+25)];
            case 'toxic':return[clamp(r*0.6),clamp(g*1.5+30),clamp(b*0.5)];
            case 'bronze':{const gbr=0.299*r+0.587*g+0.114*b;return[clamp(gbr*0.6+r*0.5+30),clamp(gbr*0.4+g*0.4+15),clamp(gbr*0.1+b*0.2)];}
            case 'ice':{const gi2=0.299*r+0.587*g+0.114*b;return[clamp(gi2*0.7+30),clamp(gi2*0.85+35),clamp(gi2+55)];}
            case 'desert':return[clamp(r*1.2+20),clamp(g+10),clamp(b*0.5+5)];
            case 'neon':return[clamp(r>128?255:r*0.5),clamp(g>100?g*1.4:g*0.3),clamp(b>128?255:b*0.5)];
            case 'coffee':{const gc2=0.299*r+0.587*g+0.114*b;return[clamp(gc2*0.5+r*0.5+25),clamp(gc2*0.35+g*0.4+12),clamp(gc2*0.15+b*0.2+5)];}
            case 'galaxy':{const gg=0.299*r+0.587*g+0.114*b;return[clamp(gg*0.4+r*0.3+20),clamp(gg*0.2+g*0.2+10),clamp(gg*0.7+b*0.6+40)];}
            case 'pop':return[clamp(r>128?220:30),clamp(g>128?210:20),clamp(b>128?220:30)];
            case 'autumn':return[clamp(r*1.15+15),clamp(g*0.9+5),clamp(b*0.6)];
            case 'bleach':{const gbl=0.299*r+0.587*g+0.114*b;return[clamp(gbl*0.3+r*0.9+40),clamp(gbl*0.3+g*0.9+38),clamp(gbl*0.3+b*0.9+42)];}
            default:return[r,g,b];
        }
    }
    function lerp(a,b,t){return clamp(a+(b-a)*t);}
    function clamp(v){return Math.max(0,Math.min(255,Math.round(v)));}
</script>
</body>
</html>
